[build]
builder = "NIXPACKS"
buildCommand = "cd nsmpi/backend && npm install && npx prisma generate && npm run build"

[deploy]
startCommand = "cd nsmpi/backend && npx prisma migrate deploy && npx prisma db seed && npm start"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
maxRestartCount = 3
