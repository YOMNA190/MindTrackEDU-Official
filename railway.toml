[build]
builder = "NIXPACKS"
buildCommand = "cd nsmpi/backend && npm install --legacy-peer-deps && npx prisma generate && npm run build"

[deploy]
startCommand = "cd nsmpi/backend && npx prisma migrate deploy && npm start"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
maxRestartCount = 3
