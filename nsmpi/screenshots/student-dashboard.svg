<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f8fafc"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="#0A4D4C"/>
  <text x="40" y="38" fill="white" font-family="Arial" font-size="20" font-weight="bold">NSMPI</text>
  <text x="650" y="38" fill="white" font-family="Arial" font-size="14">Welcome, Ahmed</text>
  
  <!-- Title -->
  <text x="40" y="100" fill="#1e293b" font-family="Arial" font-size="24" font-weight="bold">Student Dashboard</text>
  
  <!-- Quick Actions -->
  <rect x="40" y="130" width="230" height="100" rx="8" fill="white" stroke="#e2e8f0"/>
  <rect x="60" y="150" width="40" height="40" rx="6" fill="#dbeafe"/>
  <text x="110" y="175" fill="#1e40af" font-family="Arial" font-size="14" font-weight="bold">Screening</text>
  <text x="60" y="210" fill="#64748b" font-family="Arial" font-size="12">Take assessment</text>
  
  <rect x="285" y="130" width="230" height="100" rx="8" fill="white" stroke="#e2e8f0"/>
  <rect x="305" y="150" width="40" height="40" rx="6" fill="#dcfce7"/>
  <text x="355" y="175" fill="#166534" font-family="Arial" font-size="14" font-weight="bold">Sessions</text>
  <text x="305" y="210" fill="#64748b" font-family="Arial" font-size="12">View appointments</text>
  
  <rect x="530" y="130" width="230" height="100" rx="8" fill="white" stroke="#e2e8f0"/>
  <rect x="550" y="150" width="40" height="40" rx="6" fill="#f3e8ff"/>
  <text x="600" y="175" fill="#7c3aed" font-family="Arial" font-size="14" font-weight="bold">Therapists</text>
  <text x="550" y="210" fill="#64748b" font-family="Arial" font-size="12">Find support</text>
  
  <!-- Results Card -->
  <rect x="40" y="260" width="480" height="280" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="60" y="295" fill="#1e293b" font-family="Arial" font-size="16" font-weight="bold">Your Results</text>
  
  <!-- Score Boxes -->
  <rect x="60" y="320" width="130" height="80" rx="6" fill="#f1f5f9"/>
  <text x="125" y="355" text-anchor="middle" fill="#0A4D4C" font-family="Arial" font-size="24" font-weight="bold">8</text>
  <text x="125" y="380" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="12">PHQ-9 Score</text>
  
  <rect x="215" y="320" width="130" height="80" rx="6" fill="#f1f5f9"/>
  <text x="280" y="355" text-anchor="middle" fill="#0A4D4C" font-family="Arial" font-size="24" font-weight="bold">6</text>
  <text x="280" y="380" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="12">GAD-7 Score</text>
  
  <rect x="370" y="320" width="130" height="80" rx="6" fill="#f1f5f9"/>
  <text x="435" y="355" text-anchor="middle" fill="#0A4D4C" font-family="Arial" font-size="24" font-weight="bold">5</text>
  <text x="435" y="380" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="12">Focus Score</text>
  
  <!-- Risk Level -->
  <rect x="60" y="420" width="440" height="60" rx="6" fill="#fef3c7"/>
  <text x="80" y="445" fill="#92400e" font-family="Arial" font-size="12">Risk Level</text>
  <text x="80" y="465" fill="#92400e" font-family="Arial" font-size="16" font-weight="bold">MODERATE</text>
  <text x="350" y="455" fill="#92400e" font-family="Arial" font-size="14">Primary: Anxiety</text>
  
  <!-- Notifications -->
  <rect x="540" y="260" width="220" height="280" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="560" y="295" fill="#1e293b" font-family="Arial" font-size="16" font-weight="bold">Notifications</text>
  
  <rect x="560" y="315" width="180" height="50" rx="4" fill="#ecfdf5"/>
  <text x="570" y="335" fill="#065f46" font-family="Arial" font-size="11">Screening Completed</text>
  <text x="570" y="352" fill="#6b7280" font-family="Arial" font-size="10">View your results</text>
  
  <rect x="560" y="375" width="180" height="50" rx="4" fill="#eff6ff"/>
  <text x="570" y="395" fill="#1e40af" font-family="Arial" font-size="11">Therapy Request</text>
  <text x="570" y="412" fill="#6b7280" font-family="Arial" font-size="10">Approved - 70% subsidy</text>
  
  <!-- Footer Note -->
  <text x="400" y="580" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="12">Screenshot Placeholder - Student Dashboard</text>
</svg>
