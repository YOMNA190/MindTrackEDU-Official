<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f8fafc"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="#0A4D4C"/>
  <text x="40" y="38" fill="white" font-family="Arial" font-size="20" font-weight="bold">NSMPI</text>
  <text x="550" y="38" fill="white" font-family="Arial" font-size="14">National Dashboard</text>
  
  <!-- Title -->
  <text x="40" y="100" fill="#1e293b" font-family="Arial" font-size="24" font-weight="bold">National Mental Health Overview</text>
  
  <!-- KPI Cards -->
  <rect x="40" y="120" width="130" height="80" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="60" y="150" fill="#64748b" font-family="Arial" font-size="11">Total Screenings</text>
  <text x="60" y="180" fill="#0A4D4C" font-family="Arial" font-size="24" font-weight="bold">50K</text>
  
  <rect x="190" y="120" width="130" height="80" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="210" y="150" fill="#64748b" font-family="Arial" font-size="11">Active Students</text>
  <text x="210" y="180" fill="#0A4D4C" font-family="Arial" font-size="24" font-weight="bold">45K</text>
  
  <rect x="340" y="120" width="130" height="80" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="360" y="150" fill="#64748b" font-family="Arial" font-size="11">Therapists</text>
  <text x="360" y="180" fill="#0A4D4C" font-family="Arial" font-size="24" font-weight="bold">500</text>
  
  <rect x="490" y="120" width="130" height="80" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="510" y="150" fill="#64748b" font-family="Arial" font-size="11">Sessions</text>
  <text x="510" y="180" fill="#0A4D4C" font-family="Arial" font-size="24" font-weight="bold">25K</text>
  
  <rect x="640" y="120" width="120" height="80" rx="8" fill="#0A4D4C"/>
  <text x="660" y="150" fill="#94a3b8" font-family="Arial" font-size="11">Cost Savings</text>
  <text x="660" y="180" fill="white" font-family="Arial" font-size="20" font-weight="bold">12M EGP</text>
  
  <!-- Risk Distribution Chart -->
  <rect x="40" y="220" width="360" height="180" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="60" y="250" fill="#1e293b" font-family="Arial" font-size="14" font-weight="bold">Risk Distribution</text>
  
  <!-- Bar Chart -->
  <rect x="80" y="280" width="40" height="80" rx="2" fill="#22c55e"/>
  <text x="100" y="375" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="10">Low</text>
  <text x="100" y="270" text-anchor="middle" fill="#374151" font-family="Arial" font-size="11">35%</text>
  
  <rect x="140" y="300" width="40" height="60" rx="2" fill="#eab308"/>
  <text x="160" y="375" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="10">Mod</text>
  <text x="160" y="290" text-anchor="middle" fill="#374151" font-family="Arial" font-size="11">28%</text>
  
  <rect x="200" y="320" width="40" height="40" rx="2" fill="#f97316"/>
  <text x="220" y="375" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="10">High</text>
  <text x="220" y="310" text-anchor="middle" fill="#374151" font-family="Arial" font-size="11">22%</text>
  
  <rect x="260" y="340" width="40" height="20" rx="2" fill="#ef4444"/>
  <text x="280" y="375" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="10">Sev</text>
  <text x="280" y="330" text-anchor="middle" fill="#374151" font-family="Arial" font-size="11">15%</text>
  
  <!-- Geographic Heatmap -->
  <rect x="420" y="220" width="340" height="180" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="440" y="250" fill="#1e293b" font-family="Arial" font-size="14" font-weight="bold">Geographic Distribution</text>
  
  <!-- Simple Map Representation -->
  <rect x="450" y="280" width="80" height="60" rx="4" fill="#0A4D4C" opacity="0.8"/>
  <text x="490" y="315" text-anchor="middle" fill="white" font-family="Arial" font-size="12">Cairo</text>
  
  <rect x="540" y="290" width="60" height="50" rx="4" fill="#0A4D4C" opacity="0.6"/>
  <text x="570" y="320" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Alex</text>
  
  <rect x="610" y="300" width="50" height="40" rx="4" fill="#0A4D4C" opacity="0.4"/>
  <text x="635" y="325" text-anchor="middle" fill="white" font-family="Arial" font-size="10">Giza</text>
  
  <!-- KPIs Section -->
  <rect x="40" y="420" width="230" height="120" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="60" y="450" fill="#1e293b" font-family="Arial" font-size="14" font-weight="bold">Improvement Rate</text>
  <text x="60" y="490" fill="#0A4D4C" font-family="Arial" font-size="36" font-weight="bold">68%</text>
  <text x="60" y="515" fill="#22c55e" font-family="Arial" font-size="12">↑ 5% from last month</text>
  
  <rect x="290" y="420" width="230" height="120" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="310" y="450" fill="#1e293b" font-family="Arial" font-size="14" font-weight="bold">Therapist Utilization</text>
  <text x="310" y="490" fill="#0A4D4C" font-family="Arial" font-size="36" font-weight="bold">72%</text>
  <text x="310" y="515" fill="#eab308" font-family="Arial" font-size="12">Target: 80%</text>
  
  <rect x="540" y="420" width="220" height="120" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="560" y="450" fill="#1e293b" font-family="Arial" font-size="14" font-weight="bold">Avg Sessions/Student</text>
  <text x="560" y="490" fill="#0A4D4C" font-family="Arial" font-size="36" font-weight="bold">4.2</text>
  <text x="560" y="515" fill="#22c55e" font-family="Arial" font-size="12">↑ 0.3 from last month</text>
  
  <!-- Footer Note -->
  <text x="400" y="565" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="12">Screenshot Placeholder - National Dashboard</text>
</svg>
